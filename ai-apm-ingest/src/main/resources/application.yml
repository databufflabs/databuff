server:
  port: 4318

spring:
  application:
    name: ai-apm-ingest

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health,info

ingest:
  pipeline:
    trace-tasks: ${INGEST_TRACE_TASKS:8}
    metric-tasks: ${INGEST_METRIC_TASKS:4}
    aggregate-tasks: ${INGEST_AGGREGATE_TASKS:4}
    trace-buffer-size: ${INGEST_TRACE_BUFFER_SIZE:8192}
    metric-buffer-size: ${INGEST_METRIC_BUFFER_SIZE:1024}
    aggregate-buffer-size: ${INGEST_AGGREGATE_BUFFER_SIZE:1024}
  trace:
    assembly-check-interval-ms: 2000
    # Drop spans whose resource (or HTTP metaHttpUrl) matches before enrich/fill/metric/trace write.
    # Regex uses full-string match (java.util.regex.Matcher#matches).
    # Example:
    #   ignore-resources:
    #     - /actuator/prometheus
    #     - PING
    #   ignore-resource-regex:
    #     - ^/actuator(/.*)?$
    #     - ^SELECT 1$
    ignore-resources: []
    ignore-resource-regex: []
  metric:
    trace-minute-late-flush-grace-ms: 20000
  node-id: ingest-1
  cluster:
    enabled: false
    grpc-port: 18112
  zookeeper:
    connect-string: ${ZK_CONNECT_STRING:}
  otlp:
    grpc-port: 4317
  skywalking:
    enabled: true
    grpc-port: 11800
  meta-service:
    sync-interval-ms: 60000
  remote:
    enable: true
    first-protect-time-ms: 3600000
    merge-services: []
  doris:
    fe-host: ${DORIS_FE_HOST:127.0.0.1}
    fe-http-port: ${DORIS_FE_HTTP_PORT:8030}
    fe-query-port: ${DORIS_FE_QUERY_PORT:9030}
    be-http-host: ${DORIS_BE_HTTP_HOST:}
    be-http-port: ${DORIS_BE_HTTP_PORT:8040}
    metric-database: databuff
    metric-table: service
    trace-database: databuff
    trace-table: trace_dc_span
    # Max Java String.length for log_dc_record.body (Doris STRING). Env: INGEST_DORIS_LOG_BODY_MAX_LENGTH
    log-body-max-length: ${INGEST_DORIS_LOG_BODY_MAX_LENGTH:1048576}
    # Consecutive Stream Load failures per sink before dropping the batch (fail-soft). Env: INGEST_DORIS_STREAM_LOAD_MAX_FAILURES
    stream-load-max-failures: ${INGEST_DORIS_STREAM_LOAD_MAX_FAILURES:3}
    # Parallel in-flight Stream Loads for trace_dc_span (ready-queue consumers). Env: INGEST_DORIS_TRACE_FLUSH_CONCURRENCY
    # Default 1: each load adds tablet versions; parallel loads blow past Doris's ~2000 version cap on single BE.
    trace-flush-concurrency: ${INGEST_DORIS_TRACE_FLUSH_CONCURRENCY:1}
    # Primary flush trigger: per-thread buffer hand-off at this estimated NDJSON size (default 32 MiB).
    # Prefer large/infrequent loads over small/frequent ones (BE: "Please reduce the frequency of loading data").
    flush-batch-bytes: ${INGEST_DORIS_FLUSH_BATCH_BYTES:33554432}
    # Safety poll for leftover ready-queue batches (size flush is mostly async on hand-off).
    # Only sinks with hasReady() are touched; default 5s to cut idle scheduler noise.
    flush-check-interval-ms: ${INGEST_DORIS_FLUSH_CHECK_INTERVAL_MS:5000}
    # Time fallback: rotate thread-local buffers and flush remaining rows (default 30s).
    flush-interval-ms: ${INGEST_DORIS_FLUSH_INTERVAL_MS:30000}
    # Larger batches need a longer Stream Load wait (default 60s).
    flush-timeout-ms: ${INGEST_DORIS_FLUSH_TIMEOUT_MS:60000}
    username: ${DORIS_USER:root}
    password: ${DORIS_PASSWORD:}
